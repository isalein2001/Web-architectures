name: Hetzner rescue diagnostics

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  rescue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Adding Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 222 -H ${{ secrets.HETZNER_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Check and restart Hetzner Node app
        run: |
          set +e
          sshpass -p "${{ secrets.HETZNER_SSH_PASSWORD }}" ssh -p 222 ${{ secrets.HETZNER_SSH_USER }}@${{ secrets.HETZNER_SSH_HOST }} > server-diagnostics.txt 2>&1 << 'EOF'
            set +e
            echo "=== next-reps Hetzner rescue ==="
            echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "home=$HOME"
            echo

            echo "=== app directory ==="
            cd ~/workout-tracker || {
              echo "ERROR: ~/workout-tracker does not exist"
              exit 0
            }
            pwd
            ls -la
            echo

            echo "=== ensure .env ==="
            if [ ! -f .env ]; then
              echo "creating missing .env"
              JWT_SECRET_VALUE="$(node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")"
              {
                echo 'DATABASE_URL="file:./database.sqlite"'
                echo "JWT_SECRET=\"$JWT_SECRET_VALUE\""
                echo 'APP_URL="https://next-reps.de"'
                echo 'NODE_ENV="production"'
              } > .env
              chmod 600 .env
            else
              echo ".env already exists"
            fi
            echo

            echo "=== node/npm ==="
            node -v
            npm -v
            echo

            echo "=== package ==="
            node -p "require('./package.json').main" 2>&1
            node -p "require('./package.json').scripts.start" 2>&1
            echo

            echo "=== environment presence ==="
            test -f .env && echo ".env file exists in app directory" || echo ".env file missing in app directory"
            node -e "require('dotenv').config(); console.log('DATABASE_URL=' + (process.env.DATABASE_URL ? 'present' : 'missing')); console.log('JWT_SECRET=' + (process.env.JWT_SECRET ? 'present' : 'missing')); console.log('APP_URL=' + (process.env.APP_URL || 'missing')); console.log('PORT=' + (process.env.PORT || 'unset'));" 2>&1
            echo

            echo "=== install/prisma ==="
            npm ci --omit=dev
            echo "npm_ci_exit=$?"
            npx prisma migrate deploy --schema=prisma/schema.prisma
            echo "migrate_exit=$?"
            npx prisma generate --schema=prisma/schema.prisma
            echo "generate_exit=$?"
            echo

            echo "=== startup smoke test: node server.js ==="
            timeout 12 node server.js
            echo "server_start_exit=$?"
            echo

            echo "=== restart trigger ==="
            mkdir -p tmp
            touch tmp/restart.txt
            touch server.js
            ls -la tmp
            echo

            echo "=== possible logs ==="
            echo "--- ~/log.txt ---"
            tail -n 120 ~/log.txt 2>&1
            echo "--- ~/workout-tracker/log.txt ---"
            tail -n 120 ~/workout-tracker/log.txt 2>&1
            echo "--- passenger status ---"
            passenger-status 2>&1 || true
            echo

            echo "=== done ==="
          EOF
          echo "ssh_exit=$?" >> server-diagnostics.txt
          cat server-diagnostics.txt

      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server-diagnostics.txt
          git commit -m "chore: Hetzner rescue diagnostics [skip ci]" || true
          git push || true
